name: Tests

on:
  push:
    branches: [master, main, '*.x']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    name: PHP ${{ matrix.php }} / PHPUnit ${{ matrix.phpunit }} / google2fa ${{ matrix.google2fa }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # PHP 8.1 — PHPUnit 9–10
          - { php: '8.1', phpunit: '^9.0',  google2fa: '^8.0' }
          - { php: '8.1', phpunit: '^10.0', google2fa: '^8.0' }

          # PHP 8.2 — PHPUnit 10–11
          - { php: '8.2', phpunit: '^10.0', google2fa: '^8.0' }
          - { php: '8.2', phpunit: '^11.0', google2fa: '^9.0' }

          # PHP 8.3 — PHPUnit 11–12
          - { php: '8.3', phpunit: '^11.0', google2fa: '^9.0' }
          - { php: '8.3', phpunit: '^12.0', google2fa: '^9.0' }

          # PHP 8.4 — PHPUnit 12–13
          - { php: '8.4', phpunit: '^12.0', google2fa: '^9.0' }
          - { php: '8.4', phpunit: '^13.0', google2fa: '^9.0' }

          # PHP 8.5 — PHPUnit 12–13
          - { php: '8.5', phpunit: '^12.0', google2fa: '^9.0' }
          - { php: '8.5', phpunit: '^13.0', google2fa: '^9.0' }

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, imagick
          coverage: none
          tools: composer:v2

      - name: Pin PHPUnit and google2fa
        run: |
          composer require --dev --no-update "phpunit/phpunit:${{ matrix.phpunit }}"
          composer require --no-update "pragmarx/google2fa:${{ matrix.google2fa }}"

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist --ignore-platform-req=php+

      - name: Run tests
        run: vendor/bin/phpunit
